name: trivia_pulse
description: 
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^17.1.0

  # Networking
  internet_connection_checker_plus: ^3.1.0
  dio: ^5.9.2

  # State Management
  fpdart: ^1.2.0
  equatable: ^2.0.7
  provider: ^6.1.5+1

  # Backend – Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  google_sign_in: ^7.2.0
  firebase_analytics: ^12.1.3
  firebase_crashlytics: ^5.0.8

  # Storage
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0

  # Images & SVG
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.4

  # Icons

  # Shimmer / Skeleton
  skeletonizer: ^2.1.3

  # Responsive UI
  flutter_screenutil: ^5.9.3

  # Animations
  flutter_animate: ^4.5.2
  smooth_page_indicator: ^2.0.1

  # Environment
  flutter_dotenv: ^6.0.0

  # Logging
  logger: ^2.6.2

  # Media

  # Utilities
  path_provider: ^2.1.4
  share_plus: ^13.1.0
  permission_handler: ^12.0.1

  # Device & System
  device_info_plus: ^13.1.0
  app_version_update: ^7.0.0


  # Localization

  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.12.2
  hive_ce_generator: ^1.11.1

dependency_overrides:

flutter_launcher_icons:
  image_path: "assets/images/app-icon.png"
  android: true
  adaptive_icon_background: "#1C1C1C"

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/icons/
    - .env

